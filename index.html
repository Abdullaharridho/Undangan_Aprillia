<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Alpine -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Poppins', sans-serif; }
    .font-serif { font-family: 'Playfair Display', serif; }

    /* Animasi */
    .fade-up {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease forwards;
    }

    .fade-down {
      opacity: 0;
      transform: translateY(-30px);
      animation: fadeDown 1s ease forwards;
    }

    .zoom-in {
      opacity: 0;
      transform: scale(0.9);
      animation: zoomIn 0.8s ease forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes zoomIn {
      to { opacity: 1; transform: scale(1); }
    }

    /* Background zoom */
    .bg-zoom {
      animation: bgZoom 2s ease forwards;
    }

    @keyframes bgZoom {
      from { transform: scale(1.2); }
      to { transform: scale(1); }
    }
  </style>

  <title>Wedding</title>
</head>

<body class="bg-black">

<div x-data="invitation()" x-init="init()" class="min-h-screen relative overflow-hidden">

  <!-- ================= POPUP ================= -->
  <div x-show="showPopup"
       x-transition.opacity
       class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm">

    <div class="bg-black border border-white/20 rounded-2xl p-6 w-[90%] max-w-sm text-center text-white shadow-xl zoom-in">

      <p class="text-sm mb-3 opacity-80">Masukkan Nama Anda</p>

      <input 
        type="text"
        x-model="inputName"
        placeholder="Nama tamu..."
        class="w-full px-4 py-2 rounded-full bg-white/10 border border-white/30 text-white placeholder:text-white/50 focus:outline-none mb-4"
      >

      <button 
        @click="submitName"
        class="w-full py-2 border border-white rounded-full hover:bg-white hover:text-black transition">
        Lanjut
      </button>

    </div>
  </div>

  <!-- BACKGROUND IMAGE -->
  <div class="absolute inset-0 bg-cover bg-center"
       :class="opened ? 'bg-zoom' : ''"
       style="background-image: url('1.jpeg');">
  </div>

  <!-- OVERLAY -->
  <div class="absolute inset-0 bg-black/30"></div>

  <!-- SECTION HITAM -->
  <div class="relative h-[25vh] flex items-center justify-center text-white text-center z-10"
       x-show="opened"
       x-transition.opacity>

    <!-- SVG LENGKUNGAN -->
    <svg class="absolute inset-0 w-full h-full">
      <defs>
        <mask id="curveMask">
          <rect width="100%" height="100%" fill="white"/>
          <ellipse cx="50%" cy="100%" rx="70%" ry="60" fill="black"/>
        </mask>
      </defs>

      <rect width="100%" height="100%" fill="black" mask="url(#curveMask)"/>
    </svg>

    <!-- TEXT -->
    <div class="relative z-10 fade-down" style="animation-delay: 0.3s;">
      <p class="text-xs tracking-[3px] mb-2">Wedding</p>
      <h1 class="text-2xl font-serif">
        Ridho & Aprilia
      </h1>
    </div>

  </div>

  <!-- TEXT DI GAMBAR -->
  <div class="relative z-10 h-[25vh] flex flex-col items-center justify-center text-white text-center mt-[35vh]">

    <p class="text-sm opacity-80 fade-up"
       x-show="opened"
       x-transition
       style="animation-delay: 0.6s;">
      Dear
    </p>

    <!-- BOX NAMA -->
    <div class="mt-3 px-6 py-4 border border-white/40 rounded-2xl backdrop-blur-md bg-white/10 shadow-lg zoom-in"
         x-show="opened"
         x-transition
         style="animation-delay: 0.9s;">
      <p class="text-lg font-serif tracking-wide" x-text="guestName"></p>
    </div>

    <!-- BUTTON -->
    <button class="mt-6 px-8 py-3 rounded-full text-sm tracking-[2px] font-medium border border-white/40 text-white transition duration-300 hover:bg-gray-700 fade-up"
            x-show="opened"
            x-transition
            style="animation-delay: 1.2s;">
      Buka Undangan
    </button>

  </div>

</div>

<script>
function invitation() {
  return {
    showPopup: true,
    opened: false,
    inputName: '',
    guestName: 'Your Name',

    init() {
      this.opened = false;
    },

    submitName() {
      if (this.inputName.trim() !== '') {
        this.guestName = this.inputName;

        // tutup popup
        this.showPopup = false;

        // delay cinematic
        setTimeout(() => {
          this.opened = true;
        }, 400);
      }
    }
  }
}
</script>

</body>
</html>
